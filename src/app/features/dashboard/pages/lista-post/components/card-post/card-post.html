<div class="bg-white rounded-xl shadow-xl border border-slate-200 h-full">

    <!-- 1️⃣ HEADER: Titolo + ID in alto a dx -->
        <div class="flex justify-between items-center px-5 pt-5 pb-3 border-b border-slate-100">
            <h2 class="text-lg font-semibold text-slate-800 line-clamp-1">{{post().title}}</h2>
        </div>

    <!-- 2️⃣ BODY: Contenuto snippet -->
    <div class="px-5 py-4">
        <p class="text-sm text-slate-600 leading-relaxed line-clamp-3">{{post().body}}</p>
    </div>

    <!-- 3️⃣ FOOTER: Creatore cliccabile -->
    <div class="px-5 py-3 bg-slate-50 border-t border-slate-100">
        <a target="_blank" rel="noopener noreferrer" class="flex items-center gap-2 hover:text-blue-600">
            <span class="font-medium">Marco Rossi</span>
            <!-- icona "apri in nuova scheda" -->
        </a>
        <span class="text-[10px] text-gray-500 w-40"> ID Post: #{{post().id}}</span>
    </div>

</div>
