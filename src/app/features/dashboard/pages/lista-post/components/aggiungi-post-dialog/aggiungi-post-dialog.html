<div class="p-8 max-w-[800px] flex flex-col">
    <!-- Dividiamo il dialog in due sezioni separate: Titolo e Body -->
    <div class="flex justify-between border-b-2 border-gray-400 pb-2">
        <h2 mat-dialog-title class="!text-blue-900">Aggiungi Nuovo Post</h2>
        <button tabindex="-1" mat-icon-button class="-mt-2 -mr-2" mat-dialog-close>
            <mat-icon>close</mat-icon>
        </button>
    </div>

    <mat-dialog-content>
        <form [formGroup]="aggiungiPostForm" (ngSubmit)="aggiungiPost()">
            <mat-form-field class="w-full" appearance="outline">
                <mat-label>Titolo:</mat-label>
                <input matInput type="text" formControlName="title" placeholder="Inserisci un Titolo">
            </mat-form-field>
            <mat-form-field class="w-full" appearance="outline">
                <mat-label>Contenuto:</mat-label>
                <textarea matInput formControlName="body" cdkTextareaAutosize cdkAutosizeMinRows="3" cdkAutosizeMaxRows="10"></textarea>
            </mat-form-field>
            <button matButton="tonal" type="submit" [disabled]="aggiungiPostForm.invalid" mat-dialog-close>Aggiungi Post</button>
        </form>
    </mat-dialog-content>
</div>
