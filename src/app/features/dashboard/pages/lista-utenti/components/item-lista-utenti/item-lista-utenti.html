<div class="flex items-center p-3 m-2 justify-between rounded-lg hover:bg-blue-50">
    <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center font-bold {{genere() === 'male' ? 'text-blue-600' : 'text-pink-600'}}">
            <mat-icon>account_box</mat-icon>
        </div>
        <div>
            <p class="font-medium text-gray-900">{{nome()}}</p>
            <p class="text-xs text-gray-500">{{email()}}</p>
        </div>
    </div>
    <span class="text-xs px-2 p-2 rounded-full {{stato() === 'active' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}}">{{stato()}}</span>
</div>
