<div class="max-w-[1200px] mx-auto p-3">
    <app-btn-indietro> Ritorna Indietro</app-btn-indietro>

    @if (utentiStore.caricamentoDettagliUtente()) {
    <div cardDashboard class="flex items-center justify-center gap-5">
        <p class="text-xl text-bold text-blue-900">Caricamento Dati in corso...</p>
        <mat-spinner class="!h-20 !w-20"></mat-spinner>
    </div>

    } @else {
    <!-- Header Profilo Utente -->
    <div class="rounded-xl border border-gray-200 shadow-sm overflow-hidden bg-white">
        <!-- Background Header -->
        <div class="h-32 bg-gradient-to-r from-yellow-400"></div>
        <!-- Info Utente -->
        <div class="px-6 pb-6 relative">
            <div class="flex flex-col md:flex-row md:justify-between gap-6 -mt-16 relative z-10">
                <!-- Icona - Nome - Email -->
                <div class="flex flex-col md:flex-row gap-4">
                    <!-- Icona Grande -->
                    <div class="w-32 h-32 rounded-xl flex items-center
                     {{utentiStore.dettagliUtente()?.gender === 'male' ? 'bg-gradient-to-r from-blue-400 to-blue-600' : 'bg-gradient-to-r from-pink-400 to-pink-600'}}
                     flex items-center justify-center text-white border-4 border-white shadow-lg">
                        <mat-icon class="!h-28 !w-28 !text-8xl !text-center">account_box</mat-icon>
                    </div>
                    <!-- Nome + Email + Stato -->
                    <div class="md:pb-5">
                        <h1 class="text-3xl font-bold text-blue-900">{{utentiStore.dettagliUtente()?.name}}</h1>
                        <p class="text-gray-600 mt-1">{{utentiStore.dettagliUtente()?.email}}</p>
                        <div class="flex items-center gap-2 mt-2">
                            <span
                                class="text-xs px-2 p-2 rounded-full 
                                {{utentiStore.dettagliUtente()?.status === 'active' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}}">
                                {{utentiStore.dettagliUtente()?.status| pipeStato}}
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
    </div>
    }
</div>
