<div class="grid grid-cols-5 m-3 items-center">
    <div class="bg-red-200 p-3 col-span-3 items-center rounded-xl m-3">
        <div class="bg-white rounded-xl p-2 items-center">
            <h2 class="font-extrabold text-xl text-center mt-2">Che cos'è CityShare Hub?</h2>
            <h3 class="font-bold text-xl text-center mt-2">Trasforma la Tua Città</h3>
            <p class="text-center text-xl p-5">
            Condividi idee, segnalazioni e progetti per: <br>
            - ✨ Proteggere patrimonio culturale/naturale <br>
            - 🌿 Rafforzare legami sociali/ambientali <br>
            - 🆓 Gratis per tutti i cittadini attivi <br>
            
            [Registrati ora] [Scopri di più]</p>
        </div>
    </div>

    <div class="bg-blue-200 p-3 rounded-xl m-3 col-span-2 items-center">
        <div class="bg-white rounded-xl p-2 items-center flex flex-col">
            <h2 class="font-bold text-xl m-3 text-blue-900">Login</h2>
            <button matButton="outlined" class="!border-none !bg-blue-200 !rounded-xl">
                <a href="https://gorest.co.in/consumer/login" class="my-3">Clicca qui per avere il tuo Token</a>
            </button>
            <form class="mt-3 !rounded-xl !bg-white">
                <mat-form-field >
                    <mat-label >Token di Autorizzazione</mat-label>
                    <input  matInput type="text" required>
                </mat-form-field>
            </form>
        </div>
    </div>
</div>
